name: jcstress

on:
  workflow_dispatch:

jobs:
  jcstress:
    name: jcstress (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-24.04, ubuntu-24.04-arm, macos-15 ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build
        run: mvn package -pl jctools-concurrency-test -am -DskipTests -q

      - name: Run jcstress
        run: java -jar jctools-concurrency-test/target/concurrency-test.jar

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jcstress-results-${{ matrix.os }}
          path: results/
